services:
  - type: web
    name: loyverse-api-backend
    runtime: node
    repo: https://github.com/sktle-niel/loyverse-api-backend.git
    region: oregon
    plan: starter
    buildCommand: "npm run build"
    startCommand: "npm start"
    envVars:
      - key: "HOST"
        value: "0.0.0.0"
      - key: "PORT"
        value: "3001"
      # Set this to your deployed frontend origin (NO trailing slash).
      # For local testing via the browser, use your Vite origin (http://localhost:5174).
      - key: "CORS_ORIGIN"
        value: "http://localhost:5174"



      - key: "LOYVERSE_ACCESS_TOKEN"
        value: ""
      - key: "LOYVERSE_API_BASE_URL"
        value: "https://api.loyverse.com/v1.0"

    healthCheckPath: "/health"
    autoDeploy: true
